<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Fix Denver</title>
<link rel="icon" type="image/svg+xml" href="favicon-homefix.svg">
<link rel="shortcut icon" href="favicon-homefix.svg">
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>

<body class="bg-gray-50 font-sans">

<section class="max-w-6xl mx-auto p-8 grid md:grid-cols-2 gap-12">

<div>
<h2 class="text-3xl font-bold mb-4">Ready to Get Started?</h2>
<p class="text-gray-600 mb-6">Request a free estimate or schedule a service call. We respond within 24 hours.</p>

<p class="mb-2 font-semibold">(720) 397‑7368</p>
<p class="mb-8">Homefixllc59@gmail.com</p>
</div>

<form action="https://formsubmit.co/homefixllc59@gmail.com" method="POST" class="bg-white p-6 rounded-xl shadow space-y-4">

<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_subject" value="New Home Fix Service Request">
<input type="hidden" name="_template" value="table">
<input type="hidden" name="_next" value="https://homefixdenver.com/thank-you.html">

<div class="grid grid-cols-2 gap-4">
<input type="text" name="name" placeholder="Your Name" required class="border p-3 rounded w-full">
<input type="email" name="email" placeholder="Email Address" required class="border p-3 rounded w-full">
</div>

<div class="grid grid-cols-2 gap-4">
<input type="tel" name="phone" placeholder="Phone Number" class="border p-3 rounded w-full">
<select name="service" class="border p-3 rounded w-full">
<option>Select Service</option>
<option>HVAC</option>
<option>Electrical</option>
<option>Plumbing</option>
</select>
</div>

<textarea name="message" placeholder="Tell us about your project or issue..." class="border p-3 rounded w-full"></textarea>

<button type="submit" class="bg-orange-500 text-white px-6 py-3 rounded-lg w-full font-semibold">
Send Request
</button>

</form>

</section>

</body>
</html>
