<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home Fix Denver</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-white text-gray-800">

<!-- NAV -->
<nav class="fixed top-0 left-0 right-0 z-50 bg-white border-b">
  <div class="max-w-6xl mx-auto px-4">
    <div class="flex justify-between items-center h-16">

      <!-- Logo -->
      <div class="font-bold text-xl">
        Home Fix
      </div>

      <!-- Desktop menu -->
      <div class="hidden md:flex space-x-6">
        <a href="#about">About</a>
        <a href="#services">Services</a>
        <a href="#contact">Contact</a>
      </div>

      <!-- Burger -->
      <button id="mobile-menu-button" class="md:hidden">
        ☰
      </button>

    </div>

    <!-- Mobile menu -->
    <div id="mobile-menu" class="hidden flex flex-col space-y-4 py-4 md:hidden">
      <a href="#about">About</a>
      <a href="#services">Services</a>
      <a href="#contact">Contact</a>
    </div>
  </div>
</nav>

<!-- HERO -->
<section class="pt-24 text-center px-4">
  <h1 class="text-3xl font-bold">Reliable HVAC, Electrical & Plumbing</h1>
  <p class="mt-4">Serving Denver, Colorado</p>
</section>

<!-- CONTACT FORM -->
<section id="contact" class="mt-12 px-4 max-w-xl mx-auto">
  <form action="https://formsubmit.co/homefixllc59@gmail.com" method="POST" class="space-y-4">

    <input type="hidden" name="_next" value="https://homefixdenver.com/thank-you.html">

    <input type="text" name="name" placeholder="Your Name" required class="w-full border p-2">
    <input type="email" name="email" placeholder="Email" required class="w-full border p-2">
    <textarea name="message" placeholder="Message" required class="w-full border p-2"></textarea>

    <button type="submit" class="bg-blue-600 text-white px-4 py-2">
      Send
    </button>
  </form>
</section>

<!-- SCRIPT -->
<script>
document.addEventListener('DOMContentLoaded', function () {
  const button = document.getElementById('mobile-menu-button');
  const menu = document.getElementById('mobile-menu');

  button.addEventListener('click', function () {
    menu.classList.toggle('hidden');
  });

  // Close menu when clicking link
  document.querySelectorAll('#mobile-menu a').forEach(link => {
    link.addEventListener('click', () => {
      menu.classList.add('hidden');
    });
  });
});
</script>

</body>
</html>
